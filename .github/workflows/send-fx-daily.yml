name: JPS FX Daily Rate Email

on:
  schedule:
    # 09:00 Jamaica Standard Time (UTC-5) = 14:00 UTC, Mon-Fri
    # Update fetch_cron_utc in fx_config (Admin Portal → FX Schedule) if time changes
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      test:
        description: 'Send as test (true/false)'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-fx-email:
    name: Fetch FX rates and email
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger send-fx-daily edge function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/functions/v1/send-fx-daily" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -d '{"triggered_by":"github_actions","test":${{ github.event.inputs.test || 'false' }}}')
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          echo "HTTP Status: $STATUS"
          echo "Response: $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Edge function returned HTTP $STATUS"
            exit 1
          fi
          echo "$BODY" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('ok'):
              print(f'✅ FX email sent to {d.get(\"emails_sent\",0)} recipient(s)')
          else:
              print(f'❌ {d.get(\"error\") or d.get(\"reason\",\"unknown error\")}')
              sys.exit(1)
          "
